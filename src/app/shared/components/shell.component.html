<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Mobile overlay -->
  <div
    class="mobile-overlay"
    [class.active]="mobileOpen"
    (click)="mobileOpen = false"
  ></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.mobile-open]="mobileOpen">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <rect
              width="32"
              height="32"
              rx="9"
              fill="#3b82f6"
              fill-opacity="0.2"
            />
            <path
              d="M16 7v18M7 16h18"
              stroke="#3b82f6"
              stroke-width="2.5"
              stroke-linecap="round"
            />
            <circle cx="16" cy="16" r="5" fill="#3b82f6" fill-opacity="0.3" />
          </svg>
        </div>
        <span class="brand-name" *ngIf="!sidebarCollapsed">ClinicaIES</span>
      </div>
      <button
        class="collapse-btn"
        (click)="sidebarCollapsed = !sidebarCollapsed"
      >
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M3 5h14a1 1 0 010 2H3a1 1 0 110-2zm0 4h14a1 1 0 010 2H3a1 1 0 110-2zm0 4h14a1 1 0 010 2H3a1 1 0 110-2z"
            clip-rule="evenodd"
          />
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label" *ngIf="!sidebarCollapsed">
        {{ auth.isAdmin ? "ADMINISTRAÇÃO" : "ÁREA CLÍNICA" }}
      </div>
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        class="nav-item"
        [class.active]="isActive(item.route)"
        [title]="sidebarCollapsed ? item.label : ''"
      >
        <span class="nav-icon" [innerHTML]="getIcon(item.icon)"></span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">{{
          item.label
        }}</span>
        <span class="nav-badge" *ngIf="item.badge && !sidebarCollapsed">{{
          item.badge
        }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="!sidebarCollapsed">
        <div class="user-avatar">{{ userName[0].toUpperCase() }}</div>
        <div class="user-details">
          <div class="user-name">{{ userName }}</div>
          <div class="user-role">{{ userRole }}</div>
        </div>
      </div>
      <button
        class="logout-btn"
        (click)="logout()"
        [title]="sidebarCollapsed ? 'Sair' : ''"
      >
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h9a1 1 0 001-1v-2a1 1 0 10-2 0v1H4V5h7v1a1 1 0 102 0V4a1 1 0 00-1-1H3z"
            clip-rule="evenodd"
          />
          <path
            d="M16.707 10.707a1 1 0 000-1.414l-3-3a1 1 0 00-1.414 1.414L13.586 9H8a1 1 0 100 2h5.586l-1.293 1.293a1 1 0 001.414 1.414l3-3z"
          />
        </svg>
        <span *ngIf="!sidebarCollapsed">Sair</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <header class="top-bar">
      <button class="mobile-menu-btn" (click)="mobileOpen = true">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"
            clip-rule="evenodd"
          />
        </svg>
      </button>
      <div class="topbar-right">
        <div class="user-chip">
          <div class="chip-avatar">{{ userName[0].toUpperCase() }}</div>
          <span>{{ userName }}</span>
          <span class="chip-role">{{ userRole }}</span>
        </div>
      </div>
    </header>
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
